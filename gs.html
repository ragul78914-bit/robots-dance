<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Robot Dance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Dancing Robots </h1>

<div class="robot-container">

    <!-- Robot 1 -->
    <div class="robot" id="robot1">
        <div class="head"></div>
        <div class="body">
            <div class="arm left"></div>
            <div class="arm right"></div>
        </div>
        <div class="legs">
            <div class="leg left"></div>
            <div class="leg right"></div>
        </div>
    </div>

    <!-- Robot 2 -->
    <div class="robot" id="robot2">
        <div class="head"></div>
        <div class="body">
            <div class="arm left"></div>
            <div class="arm right"></div>
        </div>
        <div class="legs">
            <div class="leg left"></div>
            <div class="leg right"></div>
        </div>
    </div>

    <!-- Robot 3 -->
    <div class="robot" id="robot3">
        <div class="head"></div>
        <div class="body">
            <div class="arm left"></div>
            <div class="arm right"></div>
        </div>
        <div class="legs">
            <div class="leg left"></div>
            <div class="leg right"></div>
        </div>
    </div>

</div>

<button onclick="dance()">Start Dance</button>
<button onclick="stopDance()">Stop Dance</button>

<script src="gg.js"></script>
</body>
</html>
